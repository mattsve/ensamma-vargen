<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="4" fill="#1a2540"/>
  <!-- Simplified wolf head silhouette in white -->
  <!-- Ears -->
  <polygon points="8,14 6,4 12,10" fill="white"/>
  <polygon points="24,14 26,4 20,10" fill="white"/>
  <!-- Head -->
  <ellipse cx="16" cy="17" rx="9" ry="8" fill="white"/>
  <!-- Snout -->
  <ellipse cx="16" cy="22" rx="5" ry="3.5" fill="#d4c9a8"/>
  <!-- Eyes -->
  <circle cx="12" cy="15" r="1.5" fill="#1a2540"/>
  <circle cx="20" cy="15" r="1.5" fill="#1a2540"/>
  <!-- Nose -->
  <ellipse cx="16" cy="21" rx="2" ry="1.2" fill="#1a2540"/>
</svg>
